# azure-pipelines.yml
trigger:
- master  # 或者你的默认分支名

pool:
  vmImage: 'ubuntu-latest'

steps:
# 1. 拉取代码（Azure DevOps 会自动完成，但明确写出也可以）
- checkout: self
  fetchDepth: 1

# 2. 安装 Node.js（如果需要特定版本）
#- task: NodeTool@0
#  inputs:
#    versionSpec: '18.x'
#  displayName: 'Install Node.js'

# 3. 运行 npm install
- script: |
    npm install
  displayName: 'npm install'

# 4. 触发 Jenkins 任务
- task: JenkinsQueueJob@1
  inputs:
    serverEndpoint: 'MyJenkins'
    jobName: 'fabrikam-node-build'  # 确认这是 Jenkins 上的准确任务名
    captureConsole: true
  displayName: 'Trigger Jenkins Build'