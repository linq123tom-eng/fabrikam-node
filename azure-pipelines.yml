# azure-pipelines.yml
trigger:
- master

jobs:
- deployment: 'DeployToMyVM'
  environment:
    name: 'myLinuxVMs'
    resourceName: 'myVM'
    resourceType: 'VirtualMachine'
  strategy:
    runOnce:
      deploy:
        steps:
        # 1. 拉取代码
        - checkout: self
          clean: true
          fetchDepth: 1
          displayName: '拉取代码'

        # 2. 验证代码已拉取
        - script: |
            echo "当前目录: $(pwd)"
            echo "文件列表:"
            ls -la
          displayName: '验证代码文件'

        # 3. 安装 Node.js
        - task: NodeTool@0
          inputs:
            versionSpec: '25.x'
          displayName: '安装 Node.js'

        # 4. 验证 Node.js 版本
        - script: |
            node --version
            npm --version
          displayName: '验证 Node.js 版本'

        # 5. 安装 npm 依赖
        - script: npm install
          displayName: '安装 npm 依赖'

        # 6. 触发 Jenkins 任务
        - task: JenkinsQueueJob@2
          inputs:
            serverEndpoint: 'MyJenkins'
            jobName: 'fabrikam-node-build1'
            captureConsole: true
          displayName: '触发 Jenkins 任务'