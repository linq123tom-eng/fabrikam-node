# azure-pipelines.yml
trigger:
- master

# 不要使用 pool: Default
# 改为使用 environment
jobs:
- deployment: 'BuildAndDeploy'
  environment: 'myLinuxVMs'  # 你的环境名称
  strategy:
    runOnce:
      deploy:
        steps:
        # 1. 拉取代码
        - checkout: self
          fetchDepth: 1

        # 2. 安装 Node.js
#        - task: NodeTool@0
#          inputs:
#            versionSpec: '18.x'
#          displayName: 'Install Node.js'

        # 3. 运行 npm install
        - script: |
            npm install
          displayName: 'npm install'

        # 4. 触发 Jenkins 任务
        - task: JenkinsQueueJob@1
          inputs:
            serverEndpoint: 'MyJenkins'
            jobName: 'fabrikam-node-build'
            captureConsole: true
          displayName: 'Trigger Jenkins Build'