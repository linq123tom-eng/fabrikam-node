# azure-pipelines.yml
trigger:
- master

jobs:
- deployment: DeployToMyVM
  environment:
    name: myLinuxVMs
    resourceName: myVM   # 👈 关键！
    resourceType: VirtualMachine
  strategy:
    runOnce:
      deploy:
        steps:
        - script: |
            echo "Deployment job is running on environment: $(environment.name)"
            hostname
          displayName: 'Verify Environment'